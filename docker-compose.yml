version: '3.8'

services:
  # 1. MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: smart-ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: smart_commerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Redis Cache
  redis-cache:
    image: redis:7-alpine
    container_name: smart-ecommerce-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Confluent Kafka (KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: smart-ecommerce-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # FIX: Changed localhost to the container name "kafka"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # FIX: Changed localhost to "kafka" for the quorum voter
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  # 4. Your Spring Boot Application
  app:
    build: .
    container_name: smart-ecommerce-app
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
      - redis-cache
      - kafka
    env_file:
      - .env

volumes:
  mysql_data: